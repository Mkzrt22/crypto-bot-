# Nginx reverse proxy config (optional but recommended — gives you HTTPS)
# Place at: /etc/nginx/sites-available/crypto-trader
# Enable:   sudo ln -s /etc/nginx/sites-available/crypto-trader /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
#
# Then get a free TLS cert:
#   sudo certbot --nginx -d yourdomain.com
#
# After certbot, access dashboard at: https://yourdomain.com

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;    # <── change this

    # Redirect HTTP → HTTPS (certbot will add this automatically)
    # return 301 https://$host$request_uri;

    # ── Streamlit WebSocket + HTTP ──────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8501;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;

        proxy_read_timeout  86400;
        proxy_send_timeout  86400;

        # Basic auth — uncomment to password-protect your dashboard
        # auth_basic           "Crypto Trader";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }
}
